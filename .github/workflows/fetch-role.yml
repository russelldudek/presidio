name: Fetch Presidio Role
on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch UKG posting
        shell: bash
        run: |
          cat > payload.json <<'JSON'
          {
            "opportunitySearch": {
              "Top": 500,
              "Skip": 0,
              "QueryString": "",
              "OrderBy": [{"Value":"postedDateDesc","PropertyName":"PostedDate","Ascending":false}],
              "Filters": [
                {"t":"TermsSearchFilterDto","fieldName":4,"extra":null,"values":[]},
                {"t":"TermsSearchFilterDto","fieldName":5,"extra":null,"values":[]},
                {"t":"TermsSearchFilterDto","fieldName":6,"extra":null,"values":[]},
                {"t":"TermsSearchFilterDto","fieldName":37,"extra":null,"values":[]}
              ]
            },
            "matchCriteria": {
              "PreferredJobs":[],"Educations":[],"LicenseAndCertifications":[],"Skills":[],"hasNoLicenses":false,"SkippedSkills":[]
            }
          }
          JSON

          curl -sS -X POST \
            -H 'Accept: application/json' \
            -H 'Content-Type: application/json' \
            --data @payload.json \
            'https://recruiting.ultipro.com/PRE1019PRSD/JobBoard/4c05f321-903e-43d5-a4c0-5d9dd55dc34d/JobBoardView/LoadSearchResults' \
            -o results.json

          jq '.opportunities[] | select(.Id == "ed167829-e71b-4771-8216-9326404d6f0a")' results.json > job.json
          test -s job.json

      - name: Commit role research
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add job.json
          git diff --cached --quiet || git commit -m 'Capture target role details [skip ci]'
          git push
