name: Publish Presidio Candidate Site

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Install candidate site and clean temporary research files
        shell: bash
        run: |
          cat > /tmp/site.b64 <<'B64'

B64
          base64 -d /tmp/site.b64 > /tmp/site.zip
          unzip -o /tmp/site.zip -d .
          rm -f reader-link.md trigger.txt
          git rm -f .github/workflows/research-job.yml
          git config user.name "Russell Dudek"
          git config user.email "russelldudek@users.noreply.github.com"
          git add -A
          git commit -m "Launch Presidio VP Workforce AI candidate site"
          git push origin main
