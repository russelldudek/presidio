Delivery team, and the Microsoft Productivity Presales team.\u003cstrong\u003e\u003cbr /\u003e\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e\u0026nbsp;\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\u0022color: #000000;\u0022\u003e\u003cstrong\u003eResponsibilities Include:\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eLead and develop three integrated teams: Workforce AI Presales, Workforce AI Delivery, and Microsoft Productivity Presales \u0026mdash; fostering a unified culture of accountability, innovation, and customer impact.\u003c/li\u003e\n\u003cli\u003eDrive Talent Evolution: create a culture of accountability for leaders to recruit and develop the right talent to support rapidly evolving business needs in AI and productivity.\u003c/li\u003e\n\u003cli\u003eReduce attrition, attract top talent, and promote high-performing Solutions Architects and Delivery professionals.\u003c/li\u003e\n\u003cli\u003eMentor and motivate team members to ensure satisfactory performance; provide transparent, diverse, equitable, and inclusive leadership at all levels.\u003c/li\u003e\n\u003cli\u003eContinuously drive recruiting efforts and work closely with Talent Acquisition to ensure a diverse and continuous candidate pipeline.\u003c/li\u003e\n\u003cli\u003eEnsure SA and delivery capacity is balanced and optimally aligned to market opportunity across both Workforce AI and Microsoft Productivity practices.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u0026nbsp;\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\u0022color: #000000;\u0022\u003e\u003cstrong\u003eRequired Skills and Professional Experience:\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eOutstanding leadership and management experience, including leading both presales and delivery teams.\u003c/li\u003e\n\u003cli\u003eAuthentic and transparent leader who builds a culture of success through customer relevance and impact.\u003c/li\u003e\n\u003cli\u003eProven success in a senior leadership position with a track record of building executive relationships both internally and with strategic partners.\u003c/li\u003e\n\u003cli\u003eDeep knowledge of Workforce AI and Microsoft Productivity solutions (Microsoft 365, Copilot, Teams, Viva, and related AI tools).\u003c/li\u003e\n\u003cli\u003eSolid business acumen; ability to optimize a budget based on largest potential returns.\u003c/li\u003e\n\u003cli\u003eProven track record of driving organizational change and managing large, distributed teams.\u003c/li\u003e\n\u003cli\u003eIntimate knowledge of system and solution architectures across AI, cloud, and modern workplace domains.\u003c/li\u003e\n\u003cli\u003eExcellent written and verbal communication skills, including ability to present to large, executive-level audiences.\u003c/li\u003e\n\u003cli\u003eAbility to communicate technical concepts clearly and effectively to a variety of audiences.\u003c/li\u003e\n\u003cli\u003eStrong partner management experience with hyperscalers and ISVs in the AI and productivity space.\u003c/li\u003e\n\u003cli\u003eAbility to travel up to 40-50% to various regions to ensure visibility and leadership.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cul\u003e\n\u003cli\u003eBachelor\u0027s degree or equivalent work/military experience.\u003c/li\u003e\n\u003cli\u003eMinimum of 10 years\u0027 experience in a presales and/or delivery leadership role.\u003c/li\u003e\n\u003cli\u003e8+ years in a 2nd-line or above leadership role with a proven track record of exceeding expectations and managing large presales and/or delivery teams.\u003c/li\u003e\n\u003cli\u003eDemonstrated experience leading AI, modern workplace, or Microsoft Productivity practices preferred.\u003c/li\u003e\n\u003cli\u003eEstablished relationships with Microsoft and/or other key Workforce AI partners strongly preferred.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cspan style=\u0022color: #000000;\u0022\u003e\u003cstrong\u003ePreferred Skills and Professional Experience:\u003c/strong\u003e\u003c/span\u003e\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eUnderstand customers\u0027 overall business drivers and influences, and position Presidio\u0027s Workforce AI and Productivity portfolio to ensure successful sales and implementation.\u003c/li\u003e\n\u003cli\u003eBuild and maintain long-term client relationships; establish and convert competitively held accounts across AI and modern workplace solutions.\u003c/li\u003e\n\u003cli\u003eIdentify and build additional revenue opportunities by fostering client relationships and collaborating with regional sales teams to monetize Workforce AI and Productivity opportunities.\u003c/li\u003e\n\u003cli\u003eWork with Executive Leadership and respective internal teams to define practice area needs and develop and execute strategy and go-to-market plans.\u003c/li\u003e\n\u003cli\u003eRepresent presales and delivery impact in regular business reviews, contributing to executive-level reporting on Workforce AI and Productivity performance.\u003c/li\u003e\n\u003cli\u003eAchieve quarterly revenue and gross profit targets across the Workforce AI and Productivity portfolio.\u003c/li\u003e\n\u003cli\u003eServe as Presidio\u0027s primary executive relationship owner for key Workforce AI and productivity partners, including Microsoft (M365/Copilot), Anthropic, and other strategic AI collaboration vendors.\u003c/li\u003e\n\u003cli\u003eBuild credibility and strengthen relationships with OEM and ISV partner field teams, ensuring Presidio is positioned as a preferred delivery and go-to-market partner.\u003c/li\u003e\n\u003cli\u003eDrive joint go-to-market planning and co-sell initiatives with Workforce AI and Productivity partners to grow pipeline and accelerate deal velocity.\u003c/li\u003e\n\u003cli\u003eManage partner program compliance, investment levels, and specialization requirements to maximize MDF, incentives, and partner tier standing.\u003c/li\u003e\n\u003cli\u003eEstablish and maintain regular executive cadence with partner leadership (internal and external) to align on strategy, pipeline, and enablement priorities.\u003c/li\u003e\n\u003cli\u003eWork with respective internal and partner teams to develop and execute joint strategy and go-to-market plans aligned to Workforce AI and Productivity growth objectives.\u003c/li\u003e\n\u003cli\u003eClearly represent business needs across Workforce AI and Productivity; ensure teams are appropriately staffed and resourced.\u003c/li\u003e\n\u003cli\u003eDrive accountability for the Technical Win in Workforce AI and Microsoft Productivity engagements across the presales organization.\u003c/li\u003e\n\u003cli\u003eEnsure training and development on reporting, metrics management, and internal systems to enhance the accuracy of presales forecasts and delivery performance.\u003c/li\u003e\n\u003cli\u003eCollaborate with and influence leadership across the company and with strategic partners to advance the Workforce AI and Productivity agenda.\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003e\u003cspan style=\u0022color: #0081bc;\u0022\u003e\u003cstrong\u003eYour future at Presidio\u003cbr /\u003e\u003c/strong\u003e\u003c/span\u003e\u003cspan\u003eJoining\u003c/span\u003e\u003cspan style=\u0022color: #0081bc;\u0022\u003e\u003cstrong\u003e\u0026nbsp;\u003c/strong\u003e\u003c/span\u003e\u003cspan\u003ePresidio means stepping into a culture of trailblazers - thinkers, builders, and collaborators - who push the boundaries of what\u0027s possible. With our expertise AI-driven analytics, cloud solutions, cybersecurity, and next-gen infrastructure, we enable businesses to stay ahead in an ever-evolving digital world.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan\u003eHere, your impact is real. Whether you\u0027re harnessing the power of Generative AI, architecting resilient digital ecosystems, or driving data-driven transformation, you\u0027ll be part of a team that is shaping the future.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cstrong\u003e\u003cspan\u003eReady to innovate? Let\u0027s redefine what\u0027s next-together.\u003c/span\u003e\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan style=\u0022color: #0081bc;\u0022\u003e\u003cstrong\u003eAbout\u0026nbsp;\u003c/strong\u003e\u003c/span\u003e\u003cspan style=\u0022color: #0081bc;\u0022\u003e\u003cstrong\u003ePresidio\u003c/strong\u003e\u003c/span\u003e\u003cbr /\u003e\u003cspan\u003ePresidio\u0026nbsp;is committed to hiring the most qualified candidates to join our amazing culture. We aim to attract and hire top talent from all backgrounds, including underrepresented and marginalized communities. We encourage women, people of color, people with disabilities, and veterans to apply for open roles at Presidio. Diversity of skills and thought is a key component to our business success.\u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u003cspan\u003eAt Presidio, speed and quality meet technology and innovation. Presidio is a trusted ally for organizations across industries with a decades-long history of building traditional IT foundations and deep expertise in AI and automation, security, networking, digital transformation, and cloud computing. Presidio fills gaps, removes hurdles, optimizes costs, and reduces risk. Presidio\u0027s expert technical team develops custom applications, provides managed services, and enables actionable data insights and builds forward-thinking solutions that drive strategic outcomes for clients globally. For more information visit \u003c/span\u003e\u003c/p\u003e\n\u003cp\u003e\u0026nbsp;\u003c/p\u003e\n\u003cp\u003e\u003cem\u003e\u003cspan\u003eApplications will be accepted on a rolling basis.\u003c/span\u003e\u003c/em\u003e\u003c/p\u003e\n\u003cp style=\u0022text-align: center;\u0022\u003e\u0026nbsp;\u003c/p\u003e\n\u003cp style=\u0022text-align: center;\u0022\u003e\u003cem\u003e\u003cspan\u003ePresidio has a strong commitment to the community we serve and our employees. As an Equal Opportunity Employer, we strive to have a workforce that includes the community we serve.\u003c/span\u003e\u003c/em\u003e\u003c/p\u003e\n\u003cp style=\u0022text-align: center;\u0022\u003e\u003cem\u003e\u003cspan\u003ePresidio is an Equal Opportunity Employer Disability/Vets. We evaluate qualified applicants without regard to race, color, religion, sex, age, national origin, disability, veteran status, genetic information, and other legally protected categories.\u003c/span\u003e\u003c/em\u003e\u003c/p\u003e\n\u003cp style=\u0022text-align: center;\u0022\u003e\u003cem\u003e\u003cspan\u003eThe \u0022Know Your Rights\u0022 Poster is available here: https://www.eeoc.gov/poster\u003c/span\u003e\u003c/em\u003e\u003c/p\u003e\n\u003cp style=\u0022text-align: center;\u0022\u003e\u003cem\u003e\u003cspan\u003ePresidio EEO Policy Statement is available here: https://www.presidio.com/careers\u003c/span\u003e\u003c/em\u003e\u003c/p\u003e\n\u003cp style=\u0022text-align: center;\u0022\u003e\u003cem\u003e\u003cspan\u003ePresidio is committed to working with and providing reasonable accommodations to individuals with disabilities. If you need a reasonable\u0026nbsp;\u003c/span\u003e\u003c/em\u003e\u003cem\u003e\u003cspan\u003eaccommodation\u0026nbsp;\u003c/span\u003e\u003c/em\u003e\u003cem\u003e\u003cspan\u003ebecause of a disability for any part of the employment process, please send an e-mail to recruitment@presidio.com and let us know the nature of your request and your contact information.\u003c/span\u003e\u003c/em\u003e\u003c/p\u003e\n\u003cp style=\u0022text-align: center;\u0022\u003e\u003cem\u003e\u003cspan\u003ePresidio is a VEVRAA Federal Contractor requesting priority referrals of protected veterans for its openings. State Employment Services, please provide priority referrals to.\u003c/span\u003e\u003c/em\u003e\u003c/p\u003e\n\u003cp style=\u0022text-align: center;\u0022\u003e\u003cem\u003e\u003cspan\u003eNotice of Massachusetts Candidates: It is unlawful in Massachusetts to require or administer a lie detector test as a condition of employment or continued employment. An employer who violates this law shall be subject to criminal penalties and civil liability.\u003c/span\u003e\u003c/em\u003e\u003c/p\u003e\n\u003cp style=\u0022text-align: center;\u0022\u003e\u003cem\u003e\u003cstrong\u003eRecruitment Agencies, Please Note:\u003c/strong\u003e\u003c/em\u003e Presidio does not accept unsolicited agency resumes/CVs. Do not forward resumes/CVs to our career\u0027s email address, Presidio employees or any other means. Presidio is not responsible for any feeds related to unsolicited resumes/CVs.\u003c/p\u003e\n\u003cp style=\u0022text-align: center;\u0022\u003e\u0026nbsp;\u003c/p\u003e\n\u003cp\u003e#LI-TS1\u003c/p\u003e","EqualOpportunityEmployerDescription":"Equal Opportunity Employer/Protected Veterans/Individuals with Disabilities\u003cbr\u003e \r\nThis employer is required to notify all applicants of their rights pursuant to federal employment laws. \r\nFor further information, please review the \u003ca href=\u0027https://www.eeoc.gov/poster\u0027 target=\u0027_blank\u0027\u003eKnow Your Rights\u003c/a\u003e notice from the Department of Labor.","PayTransparencyPolicyStatement":null,"MatchScore":1.0,"HasApplied":false,"ApplicationJobBoardName":null,"ApplicationJobBoardId":null,"DateApplied":null,"Salaried":true,"CompensationAmount":null,"PublishingStatus":1,"Links":[],"BehaviorCriteria":[],"MotivationCriteria":[],"EducationCriteria":[],"LicenseAndCertificationCriteria":[],"SkillCriteria":[],"WorkExperienceCriteria":[],"JobBoardMemberships":[{"JobBoardId":"4c05f321-903e-43d5-a4c0-5d9dd55dc34d","PublishedInternal":true,"PublishedExternal":true,"ExternalPostedDate":"2026-07-09T12:41:05.117Z","InternalPostedDate":"2026-07-09T12:41:05.117Z"}],"AssessmentUri":null,"AssessmentStatus":null,"OpportunityIsClosed":false,"TravelRequired":null,"TravelDescription":null,"SupervisorName":null,"Assessments":[],"ApplicationId":nul     <script>

        function escapeHtml(text) {
            if (text == null) return '';
            var div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
            document.addEventListener('DOMContentLoaded', function() {
                const urlParams = new URLSearchParams(window.location.search);
                if (urlParams.get('showBanner') === 'true') {
                    const banner = document.getElementById('Successbanner');
                    const bannerMessage = escapeHtml($.t("Common.QuickApply.SuccessBannerMessage"));
                    const bannerAction = escapeHtml($.t("Layout.AccessibilityBanner.DismissMessage"));
                    if (banner) {
                        var ugkBanner = document.createElement('ukg-banner');
                        ugkBanner.setAttribute('inline', '');
                        ugkBanner.setAttribute('type', 'success');
                        ugkBanner.textContent = bannerMessage;

                        var endDiv = document.createElement('div');
                        endDiv.setAttribute('slot', 'end');

                        var ugkButton = document.createElement('ukg-button');
                        ugkButton.setAttribute('aria-label', 'banner-action');
                        ugkButton.setAttribute('emphasis', 'low');
                        ugkButton.textContent = bannerAction;
                        ugkButton.addEventListener('click', dismissBanner);

                        endDiv.appendChild(ugkButton);
                        ugkBanner.appendChild(endDiv);

                        banner.innerHTML = '';
                        banner.appendChild(ugkBanner);
                        banner.style.display = 'block';
                    }
                }
            });
                    function dismissBanner() {
            const banner = document.getElementById('Successbanner');
            if (banner) {
                banner.style.display = 'none';
            }
        }
        </script>
    <script>
            $(function () {
                // Clears out Matchinator session data
                $("#LogOutButton").click(function () {
                    US.utils.localStorage.removeItem('personalizedSearchProfile');
                    return true;
                });

                $("#skipLink").click(function () {
                    SkipToMainContent();

                });

                $("#skipLink").keyup(function (e) {
                    if (e.keyCode == 13) {
                        SkipToMainContent();
                    }
                });

                function SkipToMainContent() {
                    var ele = $("#PageContainer");
                    if (ele.length > 0) {
var scrollTopValue = ele.offset().top;
                        if (typeof scrollTopValue === 'number' && isFinite(scrollTopValue)) {
                            $('html, body').animate({
                                scrollTop: scrollTopValue
                            });
                        }
                        var headingEle = ele.find('h1:first, h2:first').eq(0);
                        var focusableElement;
                        if (headingEle.length > 0) {
                            focusableElement = headingEle;
                        } else {
                            focusableElement = ele;
                        }
                        focusableElement.attr("tabindex", "-1").css("outline", "none").focus();

                        return false;
                    }
                }

                $(window).resize(function () {
                    if ($(window).width() <= 767) {
                        $(".nav-pills.nav-responsive").addClass("nav-stacked");
                    } else {
                        $(".nav-pills.nav-responsive").removeClass("nav-stacked");
                    }
                });
                $(window).resize();
            });
        </script>
